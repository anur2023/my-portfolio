server.port=8080
spring.application.name=portfolio-api

# Inbox where contact-form messages are delivered
portfolio.contact.inbox=anuruddh209401@gmail.com

# Gmail SMTP — use a Google "App Password" (not your normal Gmail password).
# Set env vars before running: MAIL_USERNAME and MAIL_PASSWORD
# https://support.google.com/accounts/answer/185833
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:anuruddh209401@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
